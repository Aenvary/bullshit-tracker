<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullshit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
    <header class="app-header">
        <h1 class="app-title">Bullshit Tracker</h1>
    </header>

    <section class="section">
        <h2 class="section-title">Summary</h2>
        <div id="streak" class="streak"></div>
        <div id="totals" class="totals"></div>
    </section>

    <section class="section">
        <h2 class="section-title">Expenses</h2>
        <ul id="expense-list" class="expense-list"></ul>
    </section>

    <section class="section">
        <h2 class="section-title">Add New</h2>
        <form id="expense-form" class="expense-form">
            <div class="field">
                <label for="description">Description:</label>
                <input type="text" id="description" name="description">
            </div>
            <div class="field">
                <label for="type">Type:</label>
                <input type="text" id="type" name="type">
            </div>
            <div class="field">
                <label for="amount">Amount:</label>
                <input type="number" id="amount" name="amount">
            </div>
            <div class="field">
                <label for="date">Date:</label>
                <input type="date" id="date" name="date">
            </div>
            <div class="field">
                <span class="field-label">Category:</span>
                <div class="radio-group">
                    <input type="radio" id="needed" name="category" value="needed">
                    <label for="needed">Needed</label>
                    <input type="radio" id="worth-it" name="category" value="worth-it">
                    <label for="worth-it">Worth It</label>
                    <input type="radio" id="bullshit" name="category" value="bullshit">
                    <label for="bullshit">Bullshit</label>
                </div>
            </div>
            <button type="submit" class="submit-btn">Add Expense</button>
        </form>
    </section>
    <section class="section">
        <button class="export-btn" id="export-btn">Download JSON</button>
    </section>
</main>
<script src="script.js"></script>
</body>
</html>
